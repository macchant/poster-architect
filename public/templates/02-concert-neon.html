<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Night - Concert Poster Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .poster {
      width: 800px;
      height: 1100px;
      background: linear-gradient(180deg, #0d0d0d 0%, #1a1a2e 50%, #16213e 100%);
      position: relative;
      overflow: hidden;
    }
    .glow-orb {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.6;
    }
    .glow-pink { background: #ff0066; top: -100px; right: -100px; }
    .glow-cyan { background: #00ffcc; bottom: -100px; left: -100px; }
    .glow-purple { background: #8b5cf6; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .main-title {
      position: absolute;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 180px;
      color: white;
      text-shadow: 0 0 60px #ff0066, 0 0 120px #ff0066;
      top: 180px;
      left: 30px;
      letter-spacing: 5px;
      z-index: 10;
    }
    .subtitle {
      position: absolute;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 32px;
      color: #00ffcc;
      text-shadow: 0 0 30px #00ffcc;
      top: 360px;
      left: 30px;
      letter-spacing: 15px;
      z-index: 10;
    }
    .tour-badge {
      position: absolute;
      top: 450px;
      left: 30px;
      background: linear-gradient(135deg, #ff0066, #ff66b2);
      padding: 15px 40px;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: white;
      letter-spacing: 5px;
      z-index: 10;
    }
    .venue {
      position: absolute;
      bottom: 180px;
      left: 30px;
      right: 30px;
      z-index: 10;
    }
    .venue-line {
      display: flex;
      justify-content: space-between;
      padding: 15px 0;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      font-family: 'Inter', sans-serif;
      color: rgba(255,255,255,0.8);
      font-size: 18px;
    }
    .venue-line:last-child { border-bottom: none; }
    .ticket-btn {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: transparent;
      border: 3px solid #00ffcc;
      color: #00ffcc;
      padding: 20px 60px;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 5px;
      cursor: pointer;
      z-index: 10;
      transition: all 0.3s;
    }
    .ticket-btn:hover {
      background: #00ffcc;
      color: #111;
      box-shadow: 0 0 40px #00ffcc;
    }
    .neon-line {
      position: absolute;
      height: 3px;
      background: linear-gradient(90deg, transparent, #ff0066, #00ffcc, transparent);
      z-index: 10;
    }
    .neon-line-1 { top: 160px; left: 30px; width: 300px; }
    .neon-line-2 { bottom: 150px; right: 30px; width: 200px; }
    .speaker-wave {
      position: absolute;
      bottom: 100px;
      right: 50px;
      font-size: 60px;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div class="poster">
    <div class="glow-orb glow-pink"></div>
    <div class="glow-orb glow-cyan"></div>
    <div class="glow-orb glow-purple"></div>
    <div class="main-title">NEON<br>NIGHTS</div>
    <div class="subtitle">WORLD TOUR 2026</div>
    <div class="tour-badge">LIVE IN CONCERT</div>
    <div class="neon-line neon-line-1"></div>
    <div class="neon-line neon-line-2"></div>
    <div class="venue">
      <div class="venue-line"><span>MADISON SQUARE GARDEN</span><span>DEC 15, 2026</span></div>
      <div class="venue-line"><span>STAPLES CENTER, LA</span><span>DEC 20, 2026</span></div>
      <div class="venue-line"><span>UNITED CENTER, CHICAGO</span><span>JAN 5, 2027</span></div>
    </div>
    <button class="ticket-btn">GET TICKETS</button>
    <div class="speaker-wave">🔊</div>
  </div>
</body>
</html>
