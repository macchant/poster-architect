<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunset Paradise - Travel Poster Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #87CEEB; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .poster {
      width: 800px;
      height: 1100px;
      background: linear-gradient(180deg, #FF6B35 0%, #FFB347 30%, #87CEEB 60%, #1E90FF 100%);
      position: relative;
      overflow: hidden;
    }
    .sun {
      position: absolute;
      width: 200px;
      height: 200px;
      background: #FFD700;
      border-radius: 50%;
      top: 280px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 100px #FFD700, 0 0 200px #FF6B35;
    }
    .palm-silhouette {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 250px;
      background: #1a1a1a;
      clip-path: polygon(0% 100%, 0% 60%, 5% 50%, 8% 70%, 12% 40%, 15% 65%, 20% 30%, 25% 60%, 30% 25%, 35% 55%, 40% 20%, 45% 50%, 50% 15%, 55% 45%, 60% 20%, 65% 50%, 70% 25%, 75% 55%, 80% 30%, 85% 60%, 90% 40%, 95% 65%, 100% 50%, 100% 100%);
    }
    .destination {
      position: absolute;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 140px;
      color: white;
      text-shadow: 4px 4px 0 rgba(0,0,0,0.3);
      top: 80px;
      left: 30px;
      line-height: 0.9;
    }
    .tagline {
      position: absolute;
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      font-size: 20px;
      color: white;
      top: 580px;
      left: 30px;
      letter-spacing: 8px;
    }
    .wave-lines {
      position: absolute;
      bottom: 200px;
      left: 0;
      right: 0;
      height: 50px;
      overflow: hidden;
    }
    .wave {
      position: absolute;
      width: 200%;
      height: 100%;
      background: repeating-linear-gradient(90deg, transparent, transparent 20px, rgba(255,255,255,0.3) 20px, rgba(255,255,255,0.3) 40px);
 }
    .wave-1 { bottom: 220px; animation: wave3s linear infinite; }
    .wave-2 { bottom: 200px; animation: wave 4s linear infinite reverse; opacity: 0.5; }
    @keyframes wave {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .bird {
      position: absolute;
      font-size: 30px;
      opacity: 0.8;
    }
    .bird-1 { top: 200px; left: 100px; }
    .bird-2 { top: 180px; left: 150px; }
    .bird-3 { top: 220px; left: 200px; }
    .price-badge {
      position: absolute;
      bottom: 80px;
      right: 30px;
      background: white;
      padding: 15px 30px;
      border-radius: 50px;
    }
    .price-text {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: #FF6B35;
    }
    .book-btn {
      position: absolute;
      bottom: 80px;
      left: 30px;
      background: #1a1a1a;
      color: white;
      padding: 15px 40px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 3px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="poster">
    <div class="sun"></div>
    <div class="bird bird-1">🐦</div>
    <div class="bird bird-2">🐦</div>
    <div class="bird bird-3">🐦</div>
    <div class="destination">BALI</div>
    <div class="tagline">DISCOVER PARADISE</div>
    <div class="wave-lines">
      <div class="wave wave-1"></div>
      <div class="wave wave-2"></div>
    </div>
    <div class="palm-silhouette"></div>
    <button class="book-btn">BOOK NOW</button>
    <div class="price-badge">
      <div class="price-text">From $899</div>
    </div>
  </div>
</body>
</html>
