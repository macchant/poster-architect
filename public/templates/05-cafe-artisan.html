<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artisan Coffee - Cafe Menu Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f0e8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .poster {
      width: 800px;
      height: 1100px;
      background: linear-gradient(135deg, #3d2914 0%, #5c3d2e 50%, #8b5a3c 100%);
      position: relative;
      overflow: hidden;
    }
    .coffee-ring {
      position: absolute;
      width: 350px;
      height: 350px;
      border: 8px solid rgba(201, 162, 39, 0.3);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .coffee-ring::before {
      content: '';
      position: absolute;
      width: 280px;
      height: 280px;
      border: 4px solid rgba(201, 162, 39, 0.2);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .header-badge {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(201, 162, 39, 0.2);
      padding: 10px 30px;
      border: 1px solid #c9a227;
    }
    .header-text {
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      color: #c9a227;
      letter-spacing: 8px;
      text-transform: uppercase;
    }
    .main-title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .cafe-name {
      font-family: 'Playfair Display', serif;
      font-size: 72px;
      color: white;
      line-height: 1;
    }
    .divider {
      width: 100px;
      height: 2px;
      background: #c9a227;
      margin: 20px auto;
    }
    .tagline {
      font-family: 'Lora', serif;
      font-size: 18px;
      color: rgba(255,255,255,0.7);
      font-style: italic;
    }
    .menu-section {
      position: absolute;
      bottom: 150px;
      left: 50px;
      right: 50px;
    }
    .menu-item {
      display: flex;
      justify-content: space-between;
      padding: 15px 0;
      border-bottom: 1px dashed rgba(201, 162, 39, 0.3);
    }
    .item-name {
      font-family: 'Lora', serif;
      font-size: 16px;
      color: white;
    }
    .item-price {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      color: #c9a227;
    }
    .hours {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Lora', serif;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 2px;
    }
    .coffee-bean {
      position: absolute;
      font-size: 40px;
      opacity: 0.3;
    }
    .bean-1 { top: 100px; right: 50px; }
    .bean-2 { bottom: 250px; left: 30px; }
 </style>
</head>
<body>
  <div class="poster">
    <div class="coffee-ring"></div>
    <div class="header-badge"><div class="header-text">Est. 2018</div></div>
    <div class="main-title">
      <div class="cafe-name">ARTISAN<br>COFFEE</div>
      <div class="divider"></div>
      <div class="tagline">Where Every Cup Tells a Story</div>
    </div>
    <div class="coffee-bean bean-1">☕</div>
    <div class="coffee-bean bean-2">☕</div>
    <div class="menu-section">
      <div class="menu-item"><span class="item-name">Espresso</span><span class="item-price">$4.50</span></div>
      <div class="menu-item"><span class="item-name">Cappuccino</span><span class="item-price">$5.50</span></div>
      <div class="menu-item"><span class="item-name">Latte Art</span><span class="item-price">$6.00</span></div>
      <div class="menu-item"><span class="item-name">Cold Brew</span><span class="item-price">$5.00</span></div>
    </div>
    <div class="hours">MON-FRI 7AM-8PM | SAT-SUN 8AM-9PM</div>
  </div>
</body>
</html>
