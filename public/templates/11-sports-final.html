<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Champions League - Sports Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .poster {
      width: 800px;
      height: 1100px;
      background: linear-gradient(180deg, #c53030 0%, #e53e3e 50%, #c53030 100%);
      position: relative;
      overflow: hidden;
    }
    .diagonal-stripe {
      position: absolute;
      width: 200%;
      height: 100%;
      background: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 50px,
        rgba(0,0,0,0.1) 50px,
        rgba(0,0,0,0.1) 100px
      );
    }
    .trophy {
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 120px;
      text-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .champion-text {
      position: absolute;
      top: 200px;
      left: 0;
      right: 0;
      text-align: center;
    }
    .champion {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 90px;
      color: white;
      text-shadow: 4px 4px 0 rgba(0,0,0,0.3);
      letter-spacing: 10px;
    }
    .season {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 50px;
      color: #ffd700;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    }
    .match-info {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 90%;
    }
    .vs {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 180px;
      color: rgba(255,255,255,0.3);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .team {
      position: relative;
      z-index: 10;
    }
    .team-name {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 60px;
      color: white;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.3);
    }
    .team-name.left { text-align: left; }
    .team-name.right { text-align: right; }
    .date-badge {
      position: absolute;
      top: 700px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 20px 60px;
      text-align: center;
    }
    .date-text {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 28px;
      color: #c53030;
    }
    .date-sub {
      font-size: 14px;
      color: #666;
      margin-top: 5px;
    }
    .stadium {
      position: absolute;
      bottom: 80px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      letter-spacing: 5px;
    }
    .ticket-btn {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #ffd700;
      color: #c53030;
      border: none;
      padding: 15px 50px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .ticket-btn:hover {
      transform: translateX(-50%) scale(1.05);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div class="poster">
    <div class="diagonal-stripe"></div>
    <div class="trophy">🏆</div>
    <div class="champion-text">
      <div class="champion">CHAMPIONS</div>
      <div class="season">FINAL 2026</div>
    </div>
    <div class="match-info">
      <div class="team team-name left">REAL<br>MAJOR</div>
      <div class="vs">VS</div>
      <div class="team team-name right">CITY<br>UNITED</div>
    </div>
    <div class="date-badge">
      <div class="date-text">JUNE 15, 2026</div>
      <div class="date-sub">8:00 PM EST</div>
    </div>
    <div class="stadium">METLIFE STADIUM, NEW JERSEY</div>
    <button class="ticket-btn">GET TICKETS</button>
  </div>
</body>
</html>
