<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skincare Glow - Beauty Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fdf6f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .poster {
      width: 800px;
      height: 1100px;
      background: linear-gradient(180deg, #fdf6f0 0%, #fff5f5 50%, #ffe4e1 100%);
      position: relative;
      overflow: hidden;
    }
    .rose-gold-line {
      position: absolute;
      height: 2px;
      background: linear-gradient(90deg, transparent, #e8b4b8, transparent);
    }
    .line-top { top: 100px; left: 100px; right: 100px; }
    .line-bottom { bottom: 100px; left: 100px; right: 100px; }
    .brand {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      color: #d4a5a5;
      letter-spacing: 12px;
      text-transform: uppercase;
    }
    .circle-accent {
      position: absolute;
      border: 1px solid #e8b4b8;
      border-radius: 50%;
    }
    .circle-1 { width: 400px; height: 400px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .circle-2 { width: 350px; height: 350px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .circle-3 { width: 300px; height: 300px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .leaf {
      position: absolute;
      font-size: 100px;
      opacity: 0.1;
    }
    .leaf-1 { top: 150px; left: 50px; transform: rotate(-20deg); }
    .leaf-2 { bottom: 150px; right: 50px; transform: rotate(20deg); }
    .main-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
    }
    .glow-text {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 90px;
      color: #2d2d2d;
      line-height: 1;
    }
    .beauty-text {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 18px;
      color: #888;
      letter-spacing: 15px;
      text-transform: uppercase;
      margin-top: 20px;
    }
    .diamond-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }
    .diamond {
      width: 6px;
      height: 6px;
      background: #e8b4b8;
      transform: rotate(45deg);
    }
    .diamond-line {
      width: 60px;
      height: 1px;
      background: #e8b4b8;
    }
    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      color: #888;
      font-style: italic;
      margin-top: 30px;
    }
    .product-icons {
      position: absolute;
      bottom: 200px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 40px;
    }
    .product-icon {
      font-size: 40px;
      opacity: 0.8;
    }
    .cta-text {
      position: absolute;
      bottom: 130px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Jost', sans-serif;
      font-size: 12px;
      color: #d4a5a5;
      letter-spacing: 5px;
      text-transform: uppercase;
      text-decoration: underline;
      text-underline-offset: 5px;
    }
    .ingredients {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 30px;
    }
    .ingredient {
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      color: #bbb;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="poster">
    <div class="rose-gold-line line-top"></div>
    <div class="rose-gold-line line-bottom"></div>
    <div class="circle-accent circle-1"></div>
    <div class="circle-accent circle-2"></div>
    <div class="circle-accent circle-3"></div>
    <div class="leaf leaf-1">🌿</div>
    <div class="leaf leaf-2">🌸</div>
    <div class="brand">Skincare Studio</div>
    <div class="main-content">
      <div class="glow-text">Natural<br>Glow</div>
      <div class="beauty-text">Clean Beauty</div>
      <div class="diamond-divider">
        <div class="diamond-line"></div>
        <div class="diamond"></div>
        <div class="diamond-line"></div>
      </div>
      <div class="tagline">Radiance from Within</div>
    </div>
    <div class="product-icons">
      <span class="product-icon">🌺</span>
      <span class="product-icon">🌿</span>
      <span class="product-icon">🧴</span>
      <span class="product-icon">💧</span>
      <span class="product-icon">✨</span>
    </div>
    <div class="cta-text">Explore Collection</div>
    <div class="ingredients">
      <span class="ingredient">VITAMIN C</span>
      <span class="ingredient">•</span>
      <span class="ingredient">HYALURONIC ACID</span>
      <span class="ingredient">•</span>
      <span class="ingredient">RETINOL</span>
    </div>
  </div>
</body>
</html>
