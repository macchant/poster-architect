<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Punk - Gaming Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .poster {
      width: 800px;
      height: 1100px;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);
      position: relative;
      overflow: hidden;
    }
    .glitch-overlay {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 255, 255, 0.03) 2px,
        rgba(0, 255, 255, 0.03) 4px
      );
    }
    .hex-pattern {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5L55 20V40L30 55L5 40V20L30 5z' fill='none' stroke='%2300ffff' stroke-width='0.5' opacity='0.2'/%3E%3C/svg%3E");
      background-size: 60px 60px;
      opacity: 0.5;
    }
    .scan-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(180deg, transparent, rgba(0,255,255,0.3), transparent);
      animation: scan 4s linear infinite;
    }
    @keyframes scan {
      0% { top: -10px; }
      100% { top: 100%; }
    }
    .main-title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
    }
    .cyber-text {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 80px;
      color: #00ffff;
      text-shadow: 0 0 30px #00ffff, 0 0 60px #00ffff;
      animation: glitch 2s infinite;
    }
    @keyframes glitch {
      0%, 90%, 100% { transform: translate(0); }
      92% { transform: translate(-2px, 2px); }
      94% { transform: translate(2px, -2px); }
      96% { transform: translate(-2px, -2px); }
      98% { transform: translate(2px, 2px); }
    }
    .punk-text {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 100px;
      background: linear-gradient(180deg, #ff00ff, #ff66ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 0.9;
    }
    .edition-badge {
      position: absolute;
      top: 100px;
      left: 50%;
      transform: translateX(-50%);
      border: 2px solid #ff00ff;
      padding: 10px 30px;
    }
    .edition-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      color: #ff00ff;
      letter-spacing: 5px;
    }
    .release {
      position: absolute;
      top: 720px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 255, 255, 0.1);
      padding: 15px 40px;
      border: 1px solid #00ffff;
    }
    .release-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px;
      color: #00ffff;
      letter-spacing: 3px;
    }
    .platform {
      position: absolute;
      bottom: 150px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 30px;
    }
    .platform-icon {
      width: 60px;
      height: 60px;
      border: 2px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: rgba(255,255,255,0.5);
    }
    .cta-btn {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #ff00ff, #00ffff);
      border: none;
      padding: 20px 60px;
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      color: #0a0a0a;
      font-weight: 700;
      letter-spacing: 3px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="poster">
    <div class="glitch-overlay"></div>
    <div class="hex-pattern"></div>
    <div class="scan-line"></div>
    <div class="edition-badge">
      <div class="edition-text">⚡ 2026 EDITION ⚡</div>
    </div>
    <div class="main-title">
      <div class="cyber-text">CYBER</div>
      <div class="punk-text">PUNK</div>
    </div>
    <div class="release">
      <div class="release-text">COMING FALL 2026</div>
    </div>
    <div class="platform">
      <div class="platform-icon">🎮</div>
      <div class="platform-icon">🖥️</div>
      <div class="platform-icon">📱</div>
    </div>
    <button class="cta-btn">PRE-ORDER NOW</button>
  </div>
</body>
</html>
