<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brutalist Bold - Architecture Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .poster {
      width: 800px;
      height: 1100px;
      background: #ffffff;
      position: relative;
      overflow: hidden;
    }
    .block {
      position: absolute;
      background: #111;
    }
    .block-1 { top: 0; left: 0; width: 40%; height: 100%; }
    .block-2 { bottom: 0; right: 0; width: 30%; height: 40%; }
    .block-3 { top: 20%; right: 15%; width: 15%; height: 25%; background: #ff3300; }
    .big-number {
      position: absolute;
      font-family: 'Anton', sans-serif;
      font-size: 500px;
      color: #f0f0f0;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
    }
    .title-block {
      position: absolute;
      top: 100px;
      left: 50px;
      z-index: 10;
    }
    .main-title {
      font-family: 'Anton', sans-serif;
      font-size: 120px;
      color: #111;
      line-height: 0.9;
    }
    .subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #666;
      letter-spacing: 5px;
      margin-top: 20px;
    }
    .info-block {
      position: absolute;
      bottom: 50px;
      left: 50px;
      z-index: 10;
    }
    .info-line {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: #111;
      letter-spacing: 3px;
      margin-bottom: 10px;
    }
    .red-accent {
      position: absolute;
      top: 50%;
      right: 50px;
      transform: translateY(-50%);
      width: 100px;
      height: 100px;
      background: #ff3300;
      z-index: 15;
    }
    .arrow {
      position: absolute;
      bottom: 50px;
      right: 50px;
      font-size: 60px;
      color: #111;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="poster">
    <div class="block block-1"></div>
    <div class="block block-2"></div>
    <div class="block block-3"></div>
    <div class="big-number">01</div>
    <div class="title-block">
      <div class="main-title">MODERN<br>LIVING</div>
      <div class="subtitle">ARCHITECTURE & DESIGN</div>
    </div>
    <div class="info-block">
      <div class="info-line">LOCATION: TOKYO, JAPAN</div>
      <div class="info-line">ARCHITECT: STUDIO KONO</div>
      <div class="info-line">YEAR: 2026</div>
    </div>
    <div class="arrow">→</div>
  </div>
</body>
</html>
