<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grand Opening - Business Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a365d; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .poster {
      width: 800px;
      height: 1100px;
      background: linear-gradient(180deg, #1a365d 0%, #2c5282 50%, #1a365d 100%);
      position: relative;
      overflow: hidden;
    }
    .ribbon {
      position: absolute;
      top: 50px;
      left: -80px;
      width: 300px;
      background: #ffd700;
      padding: 15px 100px 15px 80px;
      transform: rotate(-45deg);
    }
    .ribbon-text {
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      color: #1a365d;
      letter-spacing: 5px;
      font-weight: 600;
    }
    .main-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 90%;
    }
    .subtitle {
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 10px;
      margin-bottom: 20px;
    }
    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 100px;
      color: white;
      line-height: 1;
      margin-bottom: 10px;
    }
    .tagline {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 20px;
      color: rgba(255,255,255,0.8);
      letter-spacing: 8px;
    }
    .divider {
      width: 100px;
      height: 2px;
      background: #ffd700;
      margin: 40px auto;
    }
    .details {
      display: flex;
      justify-content: center;
      gap: 60px;
    }
    .detail-item {
      text-align: center;
    }
    .detail-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 3px;
      margin-bottom: 8px;
    }
    .detail-value {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: white;
    }
    .cta-btn {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: #ffd700;
      color: #1a365d;
      border: none;
      padding: 20px 60px;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .cta-btn:hover {
      transform: translateX(-50%) scale(1.05);
    }
    .contact {
      position: absolute;
      bottom: 50px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="poster">
    <div class="ribbon">
      <div class="ribbon-text">NOW OPEN</div>
    </div>
    <div class="main-content">
      <div class="subtitle">WELCOME TO</div>
      <div class="brand-name">ELEVATE</div>
      <div class="tagline">PREMIUM BUSINESS HUB</div>
      <div class="divider"></div>
      <div class="details">
        <div class="detail-item">
          <div class="detail-label">DATE</div>
          <div class="detail-value">March 28, 2026</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">TIME</div>
          <div class="detail-value">10:00 AM</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">LOCATION</div>
          <div class="detail-value">Downtown</div>
        </div>
      </div>
    </div>
    <button class="cta-btn">RSVP NOW</button>
    <div class="contact">123 Business Ave, Suite 100 • hello@elevate.com • (555) 123-4567</div>
  </div>
</body>
</html>
